<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임베드 링크 생성기</title>
    <style>
        :root { --discord-bg: #313338; --discord-embed-bg: #2b2d31; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f0f2f5; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #1e1f22; text-align: center; font-size: 20px; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #5c5e66; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #dcdfe3; border-radius: 8px; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        input:focus, textarea:focus { border-color: #5865F2; outline: none; background-color: #fff; }
        
        .color-row { display: flex; align-items: center; gap: 12px; }
        input[type="color"] { width: 45px; height: 40px; padding: 2px; cursor: pointer; border: 1px solid #ddd; }

        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; background-color: #5865F2; color: white; }
        button:hover { background-color: #4752c4; }
        button:active { transform: scale(0.98); }

        /* 미리보기 스타일 (디스코드 스타일) */
        .preview-label { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .embed-preview { background-color: var(--discord-bg); padding: 15px; border-radius: 8px; margin-top: 10px; }
        .embed-card { background-color: var(--discord-embed-bg); border-left: 4px solid #ffffff; border-radius: 4px; padding: 12px 16px; display: flex; flex-direction: column; gap: 4px; }
        .embed-author { font-size: 13px; font-weight: 600; color: #ffffff; }
        .embed-desc { font-size: 14px; color: #dbdee1; white-space: pre-wrap; margin-top: 2px; line-height: 1.4; }

        #copyStatus { text-align: center; font-size: 12px; color: #23a559; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔗 임베드 링크 생성기</h2>
    
    <div class="input-group">
        <label>제목</label>
        <input type="text" id="author" placeholder="이름을 입력하세요" oninput="updatePreview()" value="Hello">
    </div>

    <div class="input-group">
        <label>내용</label>
        <textarea id="desc" rows="4" placeholder="내용을 입력하세요 (한국어/띄어쓰기 가능)" oninput="updatePreview()">여기에 내용을 입력하면 임베드 형식으로 변환됩니다.</textarea>
    </div>

    <div class="input-group">
        <label>강조 색상 (Color)</label>
        <div class="color-row">
            <input type="color" id="color" value="#FFFFFF" oninput="updatePreview()">
            <span id="colorHex" style="font-size: 13px; color: #888;">#FFFFFF</span>
        </div>
    </div>

    <button onclick="copyFormattedLink()">특수 링크 복사하기</button>
    <div id="copyStatus">✅ 클립보드에 복사되었습니다!</div>

    <div class="preview-label">
        <label>미리보기 (실제 출력 형태)</label>
        <div class="embed-preview">
            <div class="embed-card" id="previewCard">
                <div class="embed-author" id="prevAuthor">Hello</div>
                <div class="embed-desc" id="prevDesc">여기에 내용을 입력하면 임베드 형식으로 변환됩니다.</div>
            </div>
        </div>
    </div>
</div>

<script>
    function updatePreview() {
        const author = document.getElementById('author').value || ' ';
        const desc = document.getElementById('desc').value || ' ';
        const color = document.getElementById('color').value;

        document.getElementById('prevAuthor').innerText = author;
        document.getElementById('prevDesc').innerText = desc;
        document.getElementById('previewCard').style.borderColor = color;
        document.getElementById('colorHex').innerText = color.toUpperCase();
    }
    
    function copyFormattedLink() {
        const author = encodeURIComponent(document.getElementById('author').value);
        const desc = encodeURIComponent(document.getElementById('desc').value);
        const color = encodeURIComponent(document.getElementById('color').value);
        
        // 베이스 URL 생성
        const finalUrl = `https://webembed-sb.onrender.com/embed?description=${desc}&color=${color}&author_name=${author}`;
        
        const invisibleChar = "⠀";
        const longSpace = "⠀                                  ⠀       ⠀                            ";
        const formattedText = `${longSpace}[${invisibleChar}](${finalUrl})`;
        const textArea = document.createElement("textarea");
        textArea.value = formattedText;
        document.body.appendChild(textArea);
        textArea.select();
        
        try {
            document.execCommand('copy');
            const status = document.getElementById('copyStatus');
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 2500);
        } catch (err) {
            alert('복사에 실패했습니다.');
        }
        
        document.body.removeChild(textArea);
    }
    
    updatePreview();
</script>

</body>
</html>
